schemaVersion: "2.0.0"

containerRunOptions:
  user: "dev"

commandTests:
  - name: "nix is available"
    command: "/nix/var/nix/profiles/default/bin/nix"
    args: ["--version"]
    expectedOutput: ["nix \\(Nix\\)"]

  - name: "go is on PATH"
    command: "bash"
    args: ["-lc", "which go"]
    expectedOutput: ["/nix/var/nix/profiles/variant/bin/go"]

  - name: "go runs"
    command: "bash"
    args: ["-lc", "go version"]
    expectedOutput: ["go1\\."]

  - name: "gopls is on PATH"
    command: "bash"
    args: ["-lc", "which gopls"]
    expectedOutput: ["/nix/var/nix/profiles/variant/bin/gopls"]

  - name: "gopls runs"
    command: "bash"
    args: ["-lc", "gopls version"]
    expectedOutput: ["golang.org/x/tools/gopls"]

  - name: "golangci-lint is on PATH"
    command: "bash"
    args: ["-lc", "which golangci-lint"]
    expectedOutput: ["/nix/var/nix/profiles/variant/bin/golangci-lint"]

  - name: "golangci-lint runs"
    command: "bash"
    args: ["-lc", "golangci-lint --version"]
    expectedOutput: ["golangci-lint"]

  # Negative: no other shell tools
  - name: "go variant does NOT contain python3"
    command: "bash"
    args: ["-lc", "! find /nix/store -maxdepth 3 -path '*/bin/python3' \\( -type f -o -type l \\) 2>/dev/null | grep -q ."]
    exitCode: 0

  - name: "go variant does NOT contain java"
    command: "bash"
    args: ["-lc", "! find /nix/store -path '*/bin/java' \\( -type f -o -type l \\) 2>/dev/null | grep -q ."]
    exitCode: 0

  - name: "go variant does NOT contain kubectl"
    command: "bash"
    args: ["-lc", "! find /nix/store -maxdepth 3 -path '*/bin/kubectl' \\( -type f -o -type l \\) 2>/dev/null | grep -q ."]
    exitCode: 0
